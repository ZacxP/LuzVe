    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        :root {
            --bg-black: #050505;

            --light-green: #4ade80;

            top: 50%;
            width: 2px;
            height: 0%;
            background: var(--accent-blue);
            transition: all 0.3s ease;
            transform: translateY(-50%);
        }

        .hour-item.active::before { height: 60%; }

        /* Estilo de los números del contador para evitar saltos */
        .mono-nums {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

            background: rgba(255, 255, 255, 0.03);

    </style>
</head>

        <!-- Header: Reloj y Ubicación -->
        <div class="flex justify-between items-center mb-6 px-2">

                <h1 class="text-xs font-extrabold tracking-[0.3em] text-white/30 uppercase">LuzVzla Master</h1>

            </div>
        </div>

            </button>

                <span id="date-sub" class="text-[9px] text-white/30 font-medium italic">Presiona para volver</span>
            </div>

            </button>

                <div class="flex gap-2 text-[9px] font-bold">
                    <span class="flex items-center gap-1 text-green-500/60">● Energía</span>
                    <span class="flex items-center gap-1 text-red-500/60">● Corte</span>
                </div>

            </div>
        </div>

            <p class="text-[9px] text-white/10 font-bold uppercase tracking-[0.5em]">Desarrollo de Precisión • 2024</p>
        </footer>
    </div>

    <script>
        const VET_OFFSET = -4;
        const BASE_DATE = new Date(2024, 4, 11, 18, 0, 0); 

        let viewDate = new Date();
        viewDate.setHours(0,0,0,0);

        function getFullStatus(targetMoment) {
            let pointer = new Date(BASE_DATE);
            let state = true;
            
            while (pointer <= targetMoment) {
                const hour = pointer.getHours();
                const duration = (hour >= 22 || hour < 10) ? 3 : 4;
                let nextPointer = new Date(pointer.getTime() + (duration * 3600000));

                if (targetMoment >= pointer && targetMoment < nextPointer) {
                    return { hasLight: state, start: pointer, end: nextPointer, duration: duration };
                }
                pointer = nextPointer;
                state = !state;
            }
            return { hasLight: state, start: pointer, end: new Date(), duration: 3 };
        }

        function updateUI() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const vetNow = new Date(utc + (3600000 * VET_OFFSET));
            
            // Reloj Principal
            document.getElementById('live-clock').innerText = vetNow.toLocaleTimeString('es-VE', { 
                hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });

            const current = getFullStatus(vetNow);
            
            // Estado y Glow
            const mainCard = document.getElementById('main-card');
            const statusText = document.getElementById('status-text');
            const statusIcon = document.getElementById('status-icon');
            
            if (current.hasLight) {
                statusText.innerText = "Energía";
                statusText.className = "text-3xl font-extrabold uppercase tracking-tight text-green-400";
                statusIcon.innerText = "💡";
                mainCard.className = "bento-card p-6 mb-4 relative overflow-hidden status-glow-green";
            } else {
                statusText.innerText = "Corte";
                statusText.className = "text-3xl font-extrabold uppercase tracking-tight text-red-500";
                statusIcon.innerText = "🌑";
                mainCard.className = "bento-card p-6 mb-4 relative overflow-hidden status-glow-red";
            }

            // Contador
            const diff = current.end - vetNow;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdown').innerText = `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            document.getElementById('next-label').innerText = `Hacia el próximo ${current.hasLight ? 'Corte' : 'Servicio'}`;
        }

        function renderSchedule() {
            const container = document.getElementById('schedule-list');
            container.innerHTML = '';
            
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const vetNow = new Date(utc + (3600000 * VET_OFFSET));

            for (let i = 0; i < 24; i++) {
                let hDate = new Date(viewDate);
                hDate.setHours(i, 0, 0, 0);
                
                const status = getFullStatus(hDate);
                const isNow = vetNow.toDateString() === viewDate.toDateString() && vetNow.getHours() === i;

                const item = document.createElement('div');
                item.className = `hour-item flex items-center justify-between py-5 border-b border-white/5 ${isNow ? 'active' : ''}`;
                
                const hDisplay = i % 12 || 12;
                const ampm = i >= 12 ? 'PM' : 'AM';

                item.innerHTML = `
                    <div class="flex items-baseline gap-2">
                        <span class="text-2xl font-extrabold ${isNow ? 'text-white' : 'text-white/40'} tracking-tighter">${hDisplay}</span>
                        <span class="text-[9px] font-black text-white/20 uppercase">${ampm}</span>
                    </div>
                    
                    <div class="flex items-center gap-6">
                        <div class="flex flex-col items-end">
                            <span class="text-[10px] font-black ${status.hasLight ? 'text-green-500/60' : 'text-red-500/60'} uppercase tracking-[0.1em]">
                                ${status.hasLight ? 'Energía' : 'Corte'}
                            </span>
                        </div>
                        <div class="w-1.5 h-1.5 rounded-full ${status.hasLight ? 'bg-green-500' : 'bg-red-500'} ${isNow ? 'animate-pulse' : ''}"></div>
                    </div>
                `;
                container.appendChild(item);
            }

            document.getElementById('date-main').innerText = viewDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
        }

        document.getElementById('btn-prev').onclick = () => { viewDate.setDate(viewDate.getDate() - 1); renderSchedule(); };
        document.getElementById('btn-next').onclick = () => { viewDate.setDate(viewDate.getDate() + 1); renderSchedule(); };
        document.getElementById('btn-today').onclick = () => { 
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const vetNow = new Date(utc + (3600000 * VET_OFFSET));
            viewDate = new Date(vetNow); 
            viewDate.setHours(0,0,0,0); 
            renderSchedule(); 
        };

        // Init
        renderSchedule();
        updateUI();
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
